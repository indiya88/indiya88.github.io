        content: A multi-client business intelligence platform that gives small business owners enterprise-grade analytics. Built end-to-end with Flask/Python, MySQL, Chart.js, and an AI briefing panel powered by Claude (Anthropic). Deployed on Railway with GitHub auto-deploy, per-client data isolation, PDF export, and a Stripe-integrated marketing site.
