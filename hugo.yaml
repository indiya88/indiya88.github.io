  # Hero
  hero:
    enable: true
    intro: "Allow me to reintroduce myself...."
    title: "My Name is Renee..."
    subtitle: "I Transform Complexity into Clarity."
    content: |- 
      Fueled by coffee and curiosity, I work at the intersection of **data analytics and cloud infrastructure**. I don’t just analyze data—I understand the systems that **collect, secure, and deliver it**.
      I’ve deployed containerized services on a **Debian-based OVH VPS**, configured secure **NGINX reverse proxies with SSL termination**, and migrated a full **Grafana + Loki observability stack** into production using Docker. These experiences strengthened my ability to think beyond dashboards and approach data from an **end-to-end perspective**.
      I enjoy transforming raw logs into actionable insight and building systems that are **reliable, secure, and scalable**—because strong analytics begins with strong infrastructure.
             
    image: /images/ind3.png
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "Renee_Ramjet_Resume2.pdf"
      download: false
      newPage: true
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/indiya88
       # - icon: fab fa-x-twitter
       #   url: https://example.com
      customIcons:
        - icon: /images/my_logo.png
          url: "https://indiya88.github.io/"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/hero.gif"
    content: |-
      
      I’m the kind of person who genuinely gets excited when a project gets complicated. Whether I’m untangling a messy dataset or deploying a containerized logging pipeline on a cloud server, I thrive when moving pieces finally align.
      For me, it’s never just about the technical win—it’s about the impact. I’ve seen how reliable systems and clear data can make someone’s day easier, streamline workflows, and strengthen overall security. That’s why I approach problems from both angles: the analytics side and the infrastructure behind it.

      During my IT DevOps internship:
      
      I deployed and containerized services on a **Debian-based OVH VPS**.

      I configured secure **NGINX reverse proxies with SSL termination**.

      I migrated a full **Grafana + Loki observability stack** using Docker.

      I implemented a **Dockerized OpenVPN solution with static IP allocation** for an international team.

      These projects deepened my understanding of how data moves through real production environments—from ingestion and logging to visualization and actionable insight.
      As I continue advancing in Data Analytics, I’m strengthening my expertise in **SQL**, **Python**, **data modeling**, and visualization tools like **Power BI** and **Grafana**.
