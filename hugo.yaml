  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/ind3.png"
    content: |-
      I'm the kind of person who genuinely gets excited when a project gets complicated. Whether I'm untangling a messy dataset, deploying a containerized logging pipeline, or cold-pitching a business intelligence demo to a local business owner — I thrive when moving pieces finally align.

      For me, it's never just about the technical win. It's about impact. I've seen how reliable systems and clear data can streamline workflows, strengthen security, and make someone's day measurably easier. That's why I approach problems from both angles: the analytics and the infrastructure behind it.

      Currently, I'm finishing my **Data Analytics & AI Diploma** at Trios College while actively building **NUNAKI Intelligence** — a multi-client B2B SaaS business intelligence platform that gives small business owners the kind of data clarity usually reserved for enterprises.

    skills:
      enable: true
