      - title: Zero-Trust Observability Pipeline
        content: Designed a secure, containerized observability architecture using NGINX reverse proxies with automated SSL/TLS termination. Deployed a Loki–Grafana stack integrated with Fluent Bit sidecars to centralize log aggregation, analyze system behavior, and transform infrastructure telemetry into actionable operational insights.
        image: /images/projects/observability-stack.png
        featured:
          name: View Architecture
          link: /projects/observability/
        badges:
          - "Docker"
          - "NGINX"
          - "Grafana"
          - "Fluent Bit"
          - "Log Analysis"
          - "Observability"

      - title: High Availability Vault Architecture
        content: Engineered a high-availability HashiCorp Vault cluster backed by Consul and secured behind a multi-stage NGINX reverse proxy with SSL/TLS termination. Implemented Shamir seal initialization and identity-based access controls for secrets governance across distributed services.
        image: /images/projects/ha-vault.png
        featured:
          name: View Architecture
          link: /projects/ha-vault/
        badges:
          - "HashiCorp Vault"
          - "Consul"
          - "SSL/TLS"
          - "Secrets Management"
          - "HA Architecture"
        links:
          - icon: fab fa-github
            url: https://github.com/indiya88

      - title: Dockerized OpenVPN Gateway
        content: Designed and deployed a Dockerized OpenVPN gateway on a Debian server with certificate-based authentication and encrypted tunneling for secure remote infrastructure access. Configured client profiles and static VPN IP assignments to enable a remote team in Mumbai to securely connect to the Canadian server environment.
        image: /images/projects/vpn-running.png
        featured:
          name: View Architecture
          link: /projects/openVPN/
        badges:
          - "OpenVPN"
          - "Docker"
          - "Security"
          - "Access Control"
          - "Remote Access"

      - title: Zero-Trust Log Analytics Pipeline
        content: Engineered a zero-trust log analytics pipeline by isolating Loki behind an NGINX reverse proxy and enforcing Basic Authentication across all API endpoints. Restricted direct container access using internal Docker networking and validated security controls through real-time log analysis.
